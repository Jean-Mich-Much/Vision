<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>API Happy! – Vision</title>

<style>
:root {
    --bg-body: #e5edf7;

    --shadow-soft: 0 0.4em 1.2em rgba(15, 23, 42, 0.18);
    --accent: #2563eb;
    --accent-soft: rgba(37, 99, 235, 0.12);
    --accent-strong: rgba(37, 99, 235, 0.18);
    --text-main: #0f172a;
    --text-soft: #475569;
    --code-bg: rgba(15, 23, 42, 0.9);
    --code-border: rgba(15, 23, 42, 0.4);
    --radius-lg: 1.2em;
    --radius-md: .8em;
    --radius-sm: .5em;
    --gap-lg: 2.2em;
    --gap-md: 1.4em;
    --gap-sm: .8em;
    --font-main: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    --font-mono: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
}

html, body {
    margin: 0;
    padding: 0;
    min-height: 100%;
    display: flex;
    flex-direction: column;
    font-family: var(--font-main);
    background: radial-gradient(circle at top left, #f9fbff, #dbe4f3);
    color: var(--text-main);
}

body {
    backdrop-filter: blur(1.2em);
}

/* Layout global */

.page {
    flex: 1;
    display: flex;
    flex-direction: row;
}

/* Menu gauche */

.sidebar {
    display: flex;
    flex-direction: column;
    background: var(--bg-glass-strong);
    border-right: .07em solid var(--border-glass);
    backdrop-filter: blur(1.4em);
    padding: 1.2em;
    gap: 1em;
    min-width: 18em;
    box-shadow: var(--shadow-soft);
}

.sidebar h2 {
    margin: 0;
    font-size: 1.3rem;
    border-left: .18em solid var(--accent);
    padding-left: .6em;
}

.api-list {
    display: flex;
    flex-direction: column;
    gap: .4em;
}

.api-item {
    padding: .6em;
    border-radius: var(--radius-sm);
    cursor: pointer;
    background: rgba(255,255,255,0.4);
    border: .07em solid rgba(148,163,184,0.3);
    transition: background .15s ease, transform .1s ease;
}

.api-item:hover {
    background: var(--accent-soft);
    transform: translateX(.1em);
}

.api-item.active {
    background: var(--accent);
    color: white;
    border-color: var(--accent);
}

/* Zone de contenu */

.content {
    flex: 1;
    padding: 2em;
    display: flex;
    flex-direction: column;
    gap: var(--gap-lg);
}

/* Titres */

h1 {
    margin: 0;
    font-size: 1.7rem;
    display: flex;
    align-items: center;
    gap: .6em;
}

h2 {
    margin: 0;
    font-size: 1.4rem;
    border-left: .18em solid var(--accent);
    padding-left: .6em;
}

h3 {
    margin: 0;
    font-size: 1.2rem;
}

h4 {
    margin: 0;
    font-size: 1.05rem;
}

/* Texte */

p {
    margin: 0;
    color: var(--text-soft);
}

/* Code blocks */

.code-block {
    display: flex;
    flex-direction: column;
    border-radius: var(--radius-md);
    overflow: hidden;
    background: var(--code-bg);
    border: .07em solid var(--code-border);
    box-shadow: 0 .6em 1.4em rgba(15, 23, 42, 0.5);
}

.code-block-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding-inline: .9em;
    padding-block: .5em;
    background: linear-gradient(to right, rgba(15,23,42,0.95), rgba(30,64,175,0.9));
    color: #e5edff;
    font-size: .8rem;
}

.code-block-header button {
    border: none;
    background: rgba(15, 23, 42, 0.4);
    color: #e5edff;
    border-radius: 999em;
    padding-inline: .9em;
    padding-block: .25em;
    font-size: .75rem;
    cursor: pointer;
}

.code-block-content {
    padding: 1em;
    color: #e5edff;
    overflow: auto;
    font-family: var(--font-mono);
    font-size: .9rem;
}
</style>
</head>

<body>
<div class="page">

    <!-- MENU GAUCHE -->
    <aside class="sidebar">
        <h2>📚 API Happy!</h2>
        <div class="api-list" id="apiList">
            <!-- rempli par JS -->
        </div>
    </aside>

    <!-- CONTENU -->
    <main class="content" id="apiContent">
        <!-- rempli par JS -->
    </main>

</div>
<script>
// --- Liste des API Vision (triées A → Z) ---
const apiCommands = [
    "clean",
    "count",
    "create",
    "delete",
    "exists",
    "find",
    "graph",
    "link",
    "read",
    "relations",
    "stats",
    "unlink",
    "update",
    "include"
];


// --- Contenu de chaque API (sera rempli dans la PARTIE 3) ---
const apiContentData = {}; // rempli plus tard

// --- Remplit le menu de gauche ---
function buildMenu() {
    const list = document.getElementById("apiList");
    list.innerHTML = "";

    apiCommands.forEach(cmd => {
        const item = document.createElement("div");
        item.className = "api-item";
        item.dataset.cmd = cmd;
        item.textContent = "🔹 " + cmd;
        item.addEventListener("click", () => selectAPI(cmd));
        list.appendChild(item);
    });
}

// --- Active un item du menu ---
function highlightMenu(cmd) {
    document.querySelectorAll(".api-item").forEach(el => {
        el.classList.toggle("active", el.dataset.cmd === cmd);
    });
}

// --- Affiche une API dans la zone centrale ---
function selectAPI(cmd) {
    highlightMenu(cmd);

    const container = document.getElementById("apiContent");
    const html = apiContentData[cmd] || "<p>Contenu manquant.</p>";
    container.innerHTML = html;

    setupCopyButtons();
    animateContent();
}

// --- Animation douce à l’affichage ---
function animateContent() {
    const el = document.getElementById("apiContent");
    el.style.opacity = "0";
    el.style.transform = "translateY(.6em)";
    setTimeout(() => {
        el.style.transition = "opacity .3s ease, transform .3s ease";
        el.style.opacity = "1";
        el.style.transform = "translateY(0)";
    }, 10);
}

// --- Boutons “copier le code” ---
function setupCopyButtons() {
    document.querySelectorAll(".copy-btn").forEach(btn => {
        btn.onclick = () => {
            const pre = btn.closest(".code-block").querySelector("pre");
            const text = pre.innerText;

            navigator.clipboard.writeText(text).then(() => {
                const old = btn.innerHTML;
                btn.innerHTML = "✔ Copié";
                setTimeout(() => btn.innerHTML = old, 1200);
            });
        };
    });
}

// --- Initialisation ---
document.addEventListener("DOMContentLoaded", () => {
    buildMenu();
    selectAPI(apiCommands[0]); // première API affichée par défaut
});
</script>
<script>

<p><strong>Intermédiaire :</strong> unlink() modifie uniquement la cellule source.</p>

<p><strong>Expert :</strong> Aucun effet secondaire : Vision ne cascade jamais automatiquement.</p>

<h2>✨ Exemple n°1</h2>
<div class="code-block">
<div class="code-block-header"><span>unlink()</span><button class="copy-btn">Copier</button></div>
<div class="code-block-content"><pre><code>Vision_API::unlink($a, $b);</code></pre></div>
</div>

<h2>⚙️ Exemple n°2</h2>
<div class="code-block">
<div class="code-block-header"><span>Suppression d’un lien topic → post</span><button class="copy-btn">Copier</button></div>
<div class="code-block-content"><pre><code>Vision_API::unlink($postId, $topicId);</code></pre></div>
</div>

<h2>🧠 Exemple n°3</h2>
<div class="code-block">
<div class="code-block-header"><span>Nettoyage des relations invalides</span><button class="copy-btn">Copier</button></div>
<div class="code-block-content"><pre><code>$rels = Vision_API::relations($id);
foreach ($rels as $r) {
    if (!Vision_API::exists($r['id'])) {
        Vision_API::unlink($id, $r['id']);
    }
}</code></pre></div>
</div>
`;

<h1>🛠 update() — Mettre à jour une cellule</h1>

<p><strong>Débutant :</strong> Modifie les données d’une cellule existante.</p>

<p><strong>Intermédiaire :</strong> update() réécrit le fichier .vr de manière atomique.</p>

<p><strong>Expert :</strong> update() peut aussi remplacer les relations si un tableau est fourni.</p>

<h2>✨ Exemple n°1</h2>
<div class="code-block">
<div class="code-block-header"><span>update()</span><button class="copy-btn">Copier</button></div>
<div class="code-block-content"><pre><code>Vision_API::update($id, [
    "title" => "Nouveau titre"
]);</code></pre></div>
</div>

<h2>⚙️ Exemple n°2</h2>
<div class="code-block">
<div class="code-block-header"><span>Update + ajout de relation</span><button class="copy-btn">Copier</button></div>
<div class="code-block-content"><pre><code>Vision_API::update(
    $postId,
    ["text" => "Message édité"],
    [["id" => $topicId, "niveau" => 1]]
);</code></pre></div>
</div>

<h2>🧠 Exemple n°3</h2>
<div class="code-block">
<div class="code-block-header"><span>Update massif</span><button class="copy-btn">Copier</button></div>
<div class="code-block-content"><pre><code>$cells = Vision_API::find(fn($c) => true);
foreach ($cells as $c) {
    Vision_API::update($c['id'], [
        "updatedAt" => time()
    ]);
}</code></pre></div>
</div>
`;

<h1>📦 include() — Charger Vision dans votre projet</h1>

<p><strong>Débutant :</strong> Le simple fait d’inclure <code>vision.php</code> active automatiquement tout le moteur Vision.  
Aucune configuration, aucune initialisation, rien à instancier.</p>

<p><strong>Intermédiaire :</strong> L’include charge le cœur du moteur, initialise les chemins,  
prépare les fonctions API, charge Wave, et rend Vision immédiatement opérationnel.</p>

<p><strong>Expert :</strong> L’include exécute un bootstrap complet :  
détection du dossier Vision, chargement du cache interne,  
préparation des shards, autoload minimaliste, et exposition des classes  
<code>Vision_API</code>, <code>Vision_Wave</code>, <code>Vision_Cell</code>.  
Aucune dépendance externe, aucune surcharge mémoire.</p>

<h2>✨ Exemple n°1 (simple)</h2>
<div class="code-block">
<div class="code-block-header"><span>Include basique</span><button class="copy-btn">Copier</button></div>
<div class="code-block-content"><pre><code>include "vision/vision.php";

$id = Vision_API::create(["hello" => "world"]);
echo $id;</code></pre></div>
</div>

<h2>⚙️ Exemple n°2 (projet structuré)</h2>
<div class="code-block">
<div class="code-block-header"><span>Include dans un contrôleur</span><button class="copy-btn">Copier</button></div>
<div class="code-block-content"><pre><code>// index.php
include __DIR__ . "/vision/vision.php";

$posts = Vision_API::find(fn($c) =>
    isset($c['data']['text'])
);

print_r($posts);</code></pre></div>
</div>

<h2>🧠 Exemple n°3 (expert)</h2>
<div class="code-block">
<div class="code-block-header"><span>Include + configuration avancée</span><button class="copy-btn">Copier</button></div>
<div class="code-block-content"><pre><code>// bootstrap.php
define("VISION_PATH", __DIR__ . "/vision/");
include VISION_PATH . "vision.php";

// Monitoring interne
$wave = Vision_Wave::read();
print_r($wave);</code></pre></div>
</div>
`;
