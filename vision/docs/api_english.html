<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>API Happy! – Vision</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        :root {
            --bg: #050816;
            --bg-alt: #0b1020;
            --accent: #4f46e5;
            --accent-soft: rgba(79, 70, 229, 0.25);
            --accent-strong: rgba(129, 140, 248, 0.35);
            --border-subtle: rgba(148, 163, 184, 0.35);
            --text-main: #e5e7eb;
            --text-soft: #9ca3af;
            --text-strong: #f9fafb;
            --danger: #f97373;
            --success: #4ade80;
            --shadow-soft: 0 18px 45px rgba(15, 23, 42, 0.85);
            --radius-lg: 18px;
            --radius-xl: 24px;
            --blur-strong: 22px;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "SF Pro Text",
                "Segoe UI", sans-serif;
            background: radial-gradient(circle at top, #1f2937 0, #020617 55%, #000 100%);
            color: var(--text-main);
            display: flex;
            align-items: stretch;
            justify-content: center;
            padding: 32px 16px;
        }

        .app-shell {
            width: 100%;
            max-width: 1200px;
            min-height: 640px;
            background: radial-gradient(circle at top left, rgba(79, 70, 229, 0.18), transparent 55%),
                        radial-gradient(circle at bottom right, rgba(236, 72, 153, 0.16), transparent 55%),
                        rgba(15, 23, 42, 0.92);
            border-radius: 28px;
            border: 1px solid rgba(148, 163, 184, 0.35);
            box-shadow: var(--shadow-soft);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }

        .app-shell::before {
            content: "";
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at 10% 0%, rgba(56, 189, 248, 0.12), transparent 55%),
                        radial-gradient(circle at 90% 100%, rgba(236, 72, 153, 0.12), transparent 55%);
            opacity: 0.7;
            pointer-events: none;
        }

        .app-inner {
            position: relative;
            z-index: 1;
            display: flex;
            flex: 1;
            padding: 18px 18px 20px 18px;
            gap: 18px;
        }

        .sidebar {
            width: 260px;
            background: linear-gradient(145deg, rgba(15, 23, 42, 0.96), rgba(15, 23, 42, 0.88));
            border-radius: 22px;
            border: 1px solid rgba(148, 163, 184, 0.4);
            padding: 16px 14px 14px 14px;
            display: flex;
            flex-direction: column;
            gap: 14px;
            box-shadow: 0 18px 40px rgba(15, 23, 42, 0.9);
        }

        .sidebar-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
        }

        .sidebar-title {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .sidebar-title h1 {
            margin: 0;
            font-size: 18px;
            letter-spacing: 0.04em;
            text-transform: uppercase;
            color: var(--text-strong);
        }

        .sidebar-title span {
            font-size: 11px;
            color: var(--text-soft);
            text-transform: uppercase;
            letter-spacing: 0.16em;
        }

        .sidebar-badge {
            font-size: 11px;
            padding: 4px 9px;
            border-radius: 999px;
            border: 1px solid rgba(129, 140, 248, 0.7);
            background: radial-gradient(circle at top, rgba(129, 140, 248, 0.35), transparent 60%);
            color: #e0e7ff;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .sidebar-badge-dot {
            width: 7px;
            height: 7px;
            border-radius: 999px;
            background: radial-gradient(circle, #22c55e 0, #16a34a 40%, #14532d 100%);
            box-shadow: 0 0 0 4px rgba(34, 197, 94, 0.25);
        }

        .sidebar-section-title {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.16em;
            color: var(--text-soft);
            margin: 4px 0 2px 2px;
        }

        .command-list {
            display: flex;
            flex-direction: column;
            gap: 6px;
            margin-top: 4px;
        }

        .command-item {
            border-radius: 999px;
            padding: 7px 10px;
            font-size: 13px;
            color: var(--text-main);
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
            border: 1px solid transparent;
            background: linear-gradient(135deg, rgba(15, 23, 42, 0.9), rgba(15, 23, 42, 0.96));
            cursor: pointer;
            transition: all 0.18s ease-out;
        }

        .command-item span {
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .command-item small {
            font-size: 11px;
            color: var(--text-soft);
        }

        .command-item:hover {
            border-color: rgba(129, 140, 248, 0.7);
            background: radial-gradient(circle at top left, rgba(79, 70, 229, 0.35), rgba(15, 23, 42, 0.98));
            transform: translateY(-1px);
            box-shadow: 0 10px 26px rgba(15, 23, 42, 0.9);
        }

        .command-item.active {
            border-color: rgba(129, 140, 248, 0.9);
            background: radial-gradient(circle at top left, rgba(79, 70, 229, 0.55), rgba(15, 23, 42, 0.98));
            color: #e0e7ff;
            box-shadow: 0 14px 32px rgba(30, 64, 175, 0.9);
        }

        .command-item.active small {
            color: #c7d2fe;
        }

        .sidebar-footer {
            margin-top: auto;
            padding-top: 10px;
            border-top: 1px dashed rgba(148, 163, 184, 0.4);
            display: flex;
            flex-direction: column;
            gap: 6px;
            font-size: 11px;
            color: var(--text-soft);
        }

        .sidebar-footer strong {
            color: var(--text-main);
        }

        .sidebar-footer a {
            color: #a5b4fc;
            text-decoration: none;
        }

        .sidebar-footer a:hover {
            text-decoration: underline;
        }

        .main-panel {
            flex: 1;
            background: radial-gradient(circle at top, rgba(15, 23, 42, 0.96), rgba(15, 23, 42, 0.98));
            border-radius: 22px;
            border: 1px solid rgba(148, 163, 184, 0.4);
            padding: 18px 18px 16px 18px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            position: relative;
            overflow: hidden;
        }

        .main-panel-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
        }

        .main-panel-title {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .main-panel-title h2 {
            margin: 0;
            font-size: 17px;
            color: var(--text-strong);
        }

        .main-panel-title span {
            font-size: 12px;
            color: var(--text-soft);
        }

        .main-panel-badges {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .pill {
            font-size: 11px;
            padding: 4px 9px;
            border-radius: 999px;
            border: 1px solid rgba(148, 163, 184, 0.6);
            background: linear-gradient(135deg, rgba(15, 23, 42, 0.96), rgba(15, 23, 42, 0.9));
            color: var(--text-soft);
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .pill strong {
            color: var(--text-main);
        }

        .pill-dot {
            width: 6px;
            height: 6px;
            border-radius: 999px;
            background: rgba(148, 163, 184, 0.9);
        }

        .content-scroll {
            flex: 1;
            border-radius: 18px;
            border: 1px solid rgba(148, 163, 184, 0.35);
            background: radial-gradient(circle at top left, rgba(15, 23, 42, 0.98), rgba(15, 23, 42, 0.98));
            padding: 16px 16px 14px 16px;
            overflow: auto;
            position: relative;
        }

        .content-scroll::-webkit-scrollbar {
            width: 8px;
        }

        .content-scroll::-webkit-scrollbar-track {
            background: rgba(15, 23, 42, 0.9);
        }

        .content-scroll::-webkit-scrollbar-thumb {
            background: rgba(55, 65, 81, 0.9);
            border-radius: 999px;
        }

        .content-scroll::-webkit-scrollbar-thumb:hover {
            background: rgba(75, 85, 99, 0.95);
        }

        .code-block {
            margin: 14px 0;
            border-radius: 14px;
            border: 1px solid rgba(148, 163, 184, 0.45);
            background: radial-gradient(circle at top left, rgba(15, 23, 42, 0.98), rgba(15, 23, 42, 0.98));
            overflow: hidden;
        }

        .code-block-header {
            padding: 7px 10px;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.14em;
            color: var(--text-soft);
            border-bottom: 1px solid rgba(31, 41, 55, 0.9);
            background: linear-gradient(135deg, rgba(15, 23, 42, 0.98), rgba(15, 23, 42, 0.96));
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
        }

        .code-block-content {
            padding: 10px 12px;
            background: radial-gradient(circle at top left, rgba(15, 23, 42, 0.98), rgba(15, 23, 42, 0.98));
        }

        pre {
            margin: 0;
            font-family: "JetBrains Mono", ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
            font-size: 12px;
            color: #e5e7eb;
            white-space: pre;
        }

        code {
            font-family: inherit;
        }

        .copy-btn {
            font-size: 11px;
            padding: 3px 8px;
            border-radius: 999px;
            border: 1px solid rgba(148, 163, 184, 0.7);
            background: radial-gradient(circle at top, rgba(15, 23, 42, 0.98), rgba(15, 23, 42, 0.96));
            color: var(--text-soft);
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .copy-btn:hover {
            color: var(--text-main);
            border-color: rgba(129, 140, 248, 0.9);
        }

        h1, h2, h3 {
            margin: 0 0 8px 0;
            color: var(--text-strong);
        }

        h1 {
            font-size: 20px;
        }

        h2 {
            font-size: 16px;
            margin-top: 16px;
        }

        p {
            margin: 6px 0;
            font-size: 13px;
            line-height: 1.5;
            color: var(--text-main);
        }

        strong {
            color: var(--text-strong);
        }

        @media (max-width: 960px) {
            .app-inner {
                flex-direction: column;
            }
            .sidebar {
                width: 100%;
                flex-direction: row;
                overflow-x: auto;
                padding: 12px;
            }
            .command-list {
                flex-direction: row;
                flex-wrap: nowrap;
                overflow-x: auto;
            }
            .command-item {
                white-space: nowrap;
            }
        }
    </style>
</head>
<body>
<div class="app-shell">
    <div class="app-inner">
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="sidebar-title">
                    <h1>API Happy!</h1>
                    <span>Vision Core – English</span>
                </div>
                <div class="sidebar-badge">
                    <span class="sidebar-badge-dot"></span>
                    <span>Vision is loaded</span>
                </div>
            </div>

            <div>
                <div class="sidebar-section-title">Commands</div>
                <div class="command-list" id="commandList">
                    <!-- JS will inject command buttons here -->
                </div>
            </div>

            <div class="sidebar-footer">
                <div><strong>Vision</strong> – file‑based, RAM‑first, zero‑config engine.</div>
                <div>Docs in English &amp; French. API names are identical in both.</div>
            </div>
        </aside>

        <main class="main-panel">
            <div class="main-panel-header">
                <div class="main-panel-title">
                    <h2 id="apiTitle">Vision API</h2>
                    <span id="apiSubtitle">Select a command on the left to see details and examples.</span>
                </div>
                <div class="main-panel-badges">
                    <div class="pill">
                        <span class="pill-dot"></span>
                        <span><strong>Core</strong> API</span>
                    </div>
                    <div class="pill">
                        <span>PHP</span>
                        <span>8.1+</span>
                    </div>
                </div>
            </div>

            <div class="content-scroll" id="apiContent">
                <!-- JS will inject API content here -->
            </div>
        </main>
    </div>
</div>
<script>
const apiCommands = [
    "clean",
    "count",
    "create",
    "delete",
    "exists",
    "find",
    "graph",
    "link",
    "read",
    "relations",
    "stats",
    "unlink",
    "update",
    "include"
];

const apiContentData = {};

function renderCommandList() {
    const list = document.getElementById("commandList");
    list.innerHTML = "";
    apiCommands.forEach((cmd, index) => {
        const btn = document.createElement("button");
        btn.className = "command-item" + (index === 0 ? " active" : "");
        btn.dataset.command = cmd;

        const label = cmd.toUpperCase();
        btn.innerHTML = `
            <span>
                <strong>${label}</strong>
                <small>${getShortDescription(cmd)}</small>
            </span>
            <span>›</span>
        `;

        btn.addEventListener("click", () => {
            document.querySelectorAll(".command-item").forEach(el => el.classList.remove("active"));
            btn.classList.add("active");
            loadCommand(cmd);
        });

        list.appendChild(btn);
    });
}

function getShortDescription(cmd) {
    switch (cmd) {
        case "clean": return "Reset the database";
        case "count": return "Count cells";
        case "create": return "Create a cell";
        case "delete": return "Delete a cell";
        case "exists": return "Check existence";
        case "find": return "Search cells";
        case "graph": return "Explore relations";
        case "link": return "Create relations";
        case "read": return "Read a cell";
        case "relations": return "List relations";
        case "stats": return "Engine stats";
        case "unlink": return "Remove relations";
        case "update": return "Update a cell";
        case "include": return "Load Vision";
        default: return "Vision API";
    }
}

function loadCommand(cmd) {
    const container = document.getElementById("apiContent");
    const title = document.getElementById("apiTitle");
    const subtitle = document.getElementById("apiSubtitle");

    title.textContent = cmd.toUpperCase() + "()";
    subtitle.textContent = getShortDescription(cmd);

    container.innerHTML = apiContentData[cmd] || "<p>No documentation available yet.</p>";

    // Attach copy buttons
    container.querySelectorAll(".copy-btn").forEach(btn => {
        btn.addEventListener("click", () => {
            const pre = btn.closest(".code-block").querySelector("pre");
            if (!pre) return;
            const text = pre.innerText;
            navigator.clipboard.writeText(text).then(() => {
                const old = btn.textContent;
                btn.textContent = "Copied!";
                setTimeout(() => btn.textContent = "Copy", 900);
            });
        });
    });
}

document.addEventListener("DOMContentLoaded", () => {
    renderCommandList();
    loadCommand(apiCommands[0]);
});
// CLEAN
apiContentData["clean"] = `
<h1>🧹 clean() — Reset the entire Vision store</h1>

<p><strong>Beginner:</strong> Deletes every cell and relation. You start from a completely empty database.</p>
<p><strong>Intermediate:</strong> clean() removes all <code>.vr</code> files in the data folder in a safe, atomic way.</p>
<p><strong>Expert:</strong> clean() wipes all shards, relations and metadata. It is designed for test environments and full resets.</p>

<h2>✨ Example #1</h2>
<div class="code-block">
<div class="code-block-header"><span>Basic reset</span><button class="copy-btn">Copy</button></div>
<div class="code-block-content"><pre><code>Vision_API::clean();</code></pre></div>
</div>

<h2>⚙️ Example #2</h2>
<div class="code-block">
<div class="code-block-header"><span>Reset before a test suite</span><button class="copy-btn">Copy</button></div>
<div class="code-block-content"><pre><code>Vision_API::clean();
// Now you can safely seed your test data
Vision_API::create(["role" =&gt; "admin"]);</code></pre></div>
</div>

<h2>🧠 Example #3</h2>
<div class="code-block">
<div class="code-block-header"><span>Reset in a CLI script</span><button class="copy-btn">Copy</button></div>
<div class="code-block-content"><pre><code>if (in_array('--reset', $argv, true)) {
    echo "Resetting Vision...\\n";
    Vision_API::clean();
    echo "Done.\\n";
}</code></pre></div>
</div>
`;

// COUNT
apiContentData["count"] = `
<h1>🔢 count() — Count cells in Vision</h1>

<p><strong>Beginner:</strong> Returns how many cells exist in the database.</p>
<p><strong>Intermediate:</strong> count() scans the underlying shards and returns the total number of stored cells.</p>
<p><strong>Expert:</strong> count() is optimized for file‑based storage and can be used to monitor growth or capacity.</p>

<h2>✨ Example #1</h2>
<div class="code-block">
<div class="code-block-header"><span>Basic count</span><button class="copy-btn">Copy</button></div>
<div class="code-block-content"><pre><code>$total = Vision_API::count();
echo "Total cells: " . $total;</code></pre></div>
</div>

<h2>⚙️ Example #2</h2>
<div class="code-block">
<div class="code-block-header"><span>Count after seeding</span><button class="copy-btn">Copy</button></div>
<div class="code-block-content"><pre><code>Vision_API::clean();
Vision_API::create(["type" =&gt; "user"]);
Vision_API::create(["type" =&gt; "post"]);

echo "Cells after seed: " . Vision_API::count();</code></pre></div>
</div>

<h2>🧠 Example #3</h2>
<div class="code-block">
<div class="code-block-header"><span>Health check</span><button class="copy-btn">Copy</button></div>
<div class="code-block-content"><pre><code>$count = Vision_API::count();
if ($count === 0) {
    error_log("Warning: Vision is empty.");
}</code></pre></div>
</div>
`;

// CREATE
apiContentData["create"] = `
<h1>✨ create() — Create a new cell</h1>

<p><strong>Beginner:</strong> Inserts a new cell into Vision and returns its ID.</p>
<p><strong>Intermediate:</strong> create() writes a new <code>.vr</code> file atomically and returns a unique identifier.</p>
<p><strong>Expert:</strong> create() can also attach relations at creation time using a relations array.</p>

<h2>✨ Example #1</h2>
<div class="code-block">
<div class="code-block-header"><span>Basic create</span><button class="copy-btn">Copy</button></div>
<div class="code-block-content"><pre><code>$id = Vision_API::create([
    "title" =&gt; "Hello Vision",
    "text"  =&gt; "First message"
]);

echo $id;</code></pre></div>
</div>

<h2>⚙️ Example #2</h2>
<div class="code-block">
<div class="code-block-header"><span>Create with relations</span><button class="copy-btn">Copy</button></div>
<div class="code-block-content"><pre><code>$topicId = Vision_API::create(["name" =&gt; "General"]);

$postId = Vision_API::create(
    ["text" =&gt; "Hello everyone!"],
    [["id" =&gt; $topicId, "level" =&gt; 1]]
);</code></pre></div>
</div>

<h2>🧠 Example #3</h2>
<div class="code-block">
<div class="code-block-header"><span>Bulk create</span><button class="copy-btn">Copy</button></div>
<div class="code-block-content"><pre><code>$ids = [];
foreach (range(1, 100) as $i) {
    $ids[] = Vision_API::create(["index" =&gt; $i]);
}</code></pre></div>
</div>
`;

// DELETE
apiContentData["delete"] = `
<h1>🗑 delete() — Delete a cell</h1>

<p><strong>Beginner:</strong> Removes a cell from Vision using its ID.</p>
<p><strong>Intermediate:</strong> delete() removes the <code>.vr</code> file and cleans related links.</p>
<p><strong>Expert:</strong> delete() is safe to call even if the cell has many relations; Vision keeps the graph consistent.</p>

<h2>✨ Example #1</h2>
<div class="code-block">
<div class="code-block-header"><span>Basic delete</span><button class="copy-btn">Copy</button></div>
<div class="code-block-content"><pre><code>Vision_API::delete($id);</code></pre></div>
</div>

<h2>⚙️ Example #2</h2>
<div class="code-block">
<div class="code-block-header"><span>Delete if it exists</span><button class="copy-btn">Copy</button></div>
<div class="code-block-content"><pre><code>if (Vision_API::exists($id)) {
    Vision_API::delete($id);
}</code></pre></div>
</div>

<h2>🧠 Example #3</h2>
<div class="code-block">
<div class="code-block-header"><span>Delete many</span><button class="copy-btn">Copy</button></div>
<div class="code-block-content"><pre><code>$cells = Vision_API::find(fn($c) =&gt; $c['data']['type'] ?? null === 'temp');
foreach ($cells as $c) {
    Vision_API::delete($c['id']);
}</code></pre></div>
</div>
`;

// EXISTS
apiContentData["exists"] = `
<h1>❓ exists() — Check if a cell exists</h1>

<p><strong>Beginner:</strong> Returns true if a cell with this ID exists.</p>
<p><strong>Intermediate:</strong> exists() checks the underlying file and basic integrity.</p>
<p><strong>Expert:</strong> Useful for guards, migrations, and safe deletes.</p>

<h2>✨ Example #1</h2>
<div class="code-block">
<div class="code-block-header"><span>Basic check</span><button class="copy-btn">Copy</button></div>
<div class="code-block-content"><pre><code>if (Vision_API::exists($id)) {
    echo "Cell exists.";
}</code></pre></div>
</div>

<h2>⚙️ Example #2</h2>
<div class="code-block">
<div class="code-block-header"><span>Guard before read</span><button class="copy-btn">Copy</button></div>
<div class="code-block-content"><pre><code>if (!Vision_API::exists($id)) {
    http_response_code(404);
    exit("Not found");
}

$cell = Vision_API::read($id);</code></pre></div>
</div>

<h2>🧠 Example #3</h2>
<div class="code-block">
<div class="code-block-header"><span>Check many IDs</span><button class="copy-btn">Copy</button></div>
<div class="code-block-content"><pre><code>$ids = ["a1", "b2", "c3"];
foreach ($ids as $id) {
    echo $id . ": " . (Vision_API::exists($id) ? "yes" : "no") . "\\n";
}</code></pre></div>
</div>
`;

// FIND
apiContentData["find"] = `
<h1>🔍 find() — Search cells with a PHP callback</h1>

<p><strong>Beginner:</strong> Returns all cells that match a condition you define in PHP.</p>
<p><strong>Intermediate:</strong> find() iterates over cells and passes each one to your callback.</p>
<p><strong>Expert:</strong> The callback receives the full cell (id, data, relations, meta). You can build complex filters.</p>

<h2>✨ Example #1</h2>
<div class="code-block">
<div class="code-block-header"><span>Find all posts</span><button class="copy-btn">Copy</button></div>
<div class="code-block-content"><pre><code>$posts = Vision_API::find(function ($cell) {
    return ($cell['data']['type'] ?? null) === 'post';
});</code></pre></div>
</div>

<h2>⚙️ Example #2</h2>
<div class="code-block">
<div class="code-block-header"><span>Find by title</span><button class="copy-btn">Copy</button></div>
